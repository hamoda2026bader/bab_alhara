<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات - نظام باب الحارة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/products.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-store"></i> نظام باب الحارة</h2>
      <p>سوبر ماركت مواد تموينية</p>
    </div>
<ul class="sidebar-nav">
       <li><a href="dashboard.html"><i class="fas fa-home"></i> لوحة التحكم</a></li>
       <li><a href="products.html" class="active"><i class="fas fa-box"></i> المنتجات</a></li>
       <li><a href="sales.html"><i class="fas fa-shopping-cart"></i> المبيعات</a></li>
        <li><a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a></li>
        <li><a href="debts.html"><i class="fas fa-file-invoice-dollar"></i> الديون</a></li>
       <li class="logout"><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
     </ul>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h2>المنتجات</h2>
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-details">
            <h4 id="user-name">Admin User</h4>
            <span id="user-role">Admin</span>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="ابحث عن المنتجات بالاسم أو الباركود...">
        <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> إضافة منتج</button>
      </div>

      <div id="products-table" class="table-view">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>اسم المنتج</th>
                <th>الباركود</th>
                <th>سعر الشراء</th>
                <th>سعر البيع</th>
                <th>المخزون</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="products-table-body">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">إضافة منتج</h3>
        <button class="modal-close" onclick="closeProductModal()">&times;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-group">
          <label>اسم المنتج *</label>
          <input type="text" id="product-name" class="form-control" placeholder="أدخل اسم المنتج" required>
        </div>
        <div class="form-group">
          <label>الباركود</label>
          <input type="text" id="product-barcode" class="form-control" placeholder="باركود المنتج">
        </div>
        <div class="form-group">
          <label>سعر الشراء (₪)</label>
          <input type="number" id="product-purchase-price" class="form-control" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>سعر البيع (₪) *</label>
          <input type="number" id="product-selling-price" class="form-control" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label>الكمية في المخزون</label>
          <input type="number" id="product-stock" class="form-control" placeholder="0" min="0" value="0">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeProductModal()">إلغاء</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ المنتج</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
