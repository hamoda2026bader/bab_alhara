<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bab Al-Hara System - تسجيل الدخول</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-store"></i>
      <h1>Bab Al-Hara System</h1>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم">
        <i class="fas fa-user"></i>
        <div class="error-message"><i class="fas fa-exclamation-circle"></i> اسم المستخدم مطلوب</div>
      </div>

      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور">
        <i class="fas fa-lock"></i>
        <div class="error-message"><i class="fas fa-exclamation-circle"></i> كلمة المرور مطلوبة</div>
      </div>

      <div id="login-error" class="error-message hidden">
        <i class="fas fa-exclamation-circle"></i> <span></span>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="js/supabase-client.js"></script>
   <script src="js/login.js"></script>
</body>
</html>
